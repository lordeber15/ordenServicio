server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Assets con hash en el nombre → cache largo (Vite genera hashes)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html nunca se cachea (siempre pide la versión fresca)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # CLAVE: cualquier ruta que no sea un archivo real → sirve index.html
    # Esto permite que React Router maneje /ventas, /factura, etc. al recargar
    location / {
        try_files $uri $uri/ /index.html;
    }
}
